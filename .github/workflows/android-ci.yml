name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create google-services.json
        run: |
          mkdir -p app
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          else
            printf '%s\n' \
              '{' \
              '  "project_info": {' \
              '    "project_number": "1234567890",' \
              '    "project_id": "placeholder-project",' \
              '    "storage_bucket": "placeholder-project.appspot.com"' \
              '  },' \
              '  "client": [' \
              '    {' \
              '      "client_info": {' \
              '        "mobilesdk_app_id": "1:1234567890:android:placeholder",' \
              '        "android_client_info": {' \
              '          "package_name": "com.davideagostini.summ"' \
              '        }' \
              '      },' \
              '      "oauth_client": [' \
              '        {' \
              '          "client_id": "1234567890-placeholder.apps.googleusercontent.com",' \
              '          "client_type": 3' \
              '        }' \
              '      ],' \
              '      "api_key": [' \
              '        {' \
              '          "current_key": "placeholder"' \
              '        }' \
              '      ],' \
              '      "services": {' \
              '        "appinvite_service": {' \
              '          "other_platform_oauth_client": [' \
              '            {' \
              '              "client_id": "1234567890-placeholder.apps.googleusercontent.com",' \
              '              "client_type": 3' \
              '            }' \
              '          ]' \
              '        }' \
              '      }' \
              '    }' \
              '  ],' \
              '  "configuration_version": "1"' \
              '}' > app/google-services.json
          fi

      - name: Validate google-services.json
        if: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          grep -q '"package_name": "com.davideagostini.summ"' app/google-services.json
          grep -q '"client_type": 3' app/google-services.json

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Validate generated Google Sign-In resources
        if: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          ./gradlew :app:processDebugGoogleServices
          grep -q '<string name="default_web_client_id"' app/build/generated/res/processDebugGoogleServices/values/values.xml

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin :wear:compileDebugKotlin

  build-release-artifacts:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    env:
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create google-services.json
        run: |
          mkdir -p app
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "GOOGLE_SERVICES_JSON_BASE64 secret is required for release builds." >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json

      - name: Validate google-services.json
        run: |
          grep -q '"package_name": "com.davideagostini.summ"' app/google-services.json
          grep -q '"client_type": 3' app/google-services.json

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Validate generated Google Sign-In resources
        run: |
          ./gradlew :app:processReleaseGoogleServices
          grep -q '<string name="default_web_client_id"' app/build/generated/res/processReleaseGoogleServices/values/values.xml

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APKs
        run: ./gradlew :app:assembleRelease :wear:assembleRelease

      - name: Build signed release AABs
        run: ./gradlew :app:bundleRelease :wear:bundleRelease

      - name: Upload phone APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dunio-release-apk
          path: app/build/outputs/apk/release/dunio-*.apk
          if-no-files-found: error

      - name: Upload phone AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: dunio-release-aab
          path: app/build/outputs/bundle/release/dunio-*.aab
          if-no-files-found: error

      - name: Upload wear APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dunio-wear-release-apk
          path: wear/build/outputs/apk/release/dunio-wear-*.apk
          if-no-files-found: error

      - name: Upload wear AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: dunio-wear-release-aab
          path: wear/build/outputs/bundle/release/dunio-wear-*.aab
          if-no-files-found: error

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: dunio-release-mapping
          path: app/build/outputs/mapping/release/dunio-*-mapping.txt
          if-no-files-found: error

      - name: Upload wear mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: dunio-wear-release-mapping
          path: wear/build/outputs/mapping/release/dunio-wear-*-mapping.txt
          if-no-files-found: error

      - name: Check native debug metadata artifact contents
        id: native_debug_metadata
        run: |
          if find app/build/intermediates/native_debug_metadata/release/extractReleaseNativeDebugMetadata/out -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload native debug metadata artifact
        if: steps.native_debug_metadata.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dunio-release-native-debug-metadata
          path: app/build/intermediates/native_debug_metadata/release/extractReleaseNativeDebugMetadata/out/**
          if-no-files-found: error

      - name: Check native symbol tables artifact contents
        id: native_symbol_tables
        run: |
          if find app/build/intermediates/native_symbol_tables/release/extractReleaseNativeSymbolTables/out -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload native symbol tables artifact
        if: steps.native_symbol_tables.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dunio-release-native-symbol-tables
          path: app/build/intermediates/native_symbol_tables/release/extractReleaseNativeSymbolTables/out/**
          if-no-files-found: error

  publish-tagged-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-release-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract module versions
        id: versions
        run: |
          app_version=$(sed -n 's/^val appVersionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n 1)
          wear_version=$(sed -n 's/^val wearVersionName = "\(.*\)"/\1/p' wear/build.gradle.kts | head -n 1)

          if [ -z "$app_version" ]; then
            echo "Unable to extract appVersionName from app/build.gradle.kts" >&2
            exit 1
          fi

          if [ -z "$wear_version" ]; then
            echo "Unable to extract wearVersionName from wear/build.gradle.kts" >&2
            exit 1
          fi

          {
            echo "app_version=$app_version"
            echo "wear_version=$wear_version"
          } >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: dunio-release-apk
          path: dist/apk

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: dunio-release-aab
          path: dist/aab

      - name: Download wear APK artifact
        uses: actions/download-artifact@v4
        with:
          name: dunio-wear-release-apk
          path: dist/wear-apk

      - name: Download wear AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: dunio-wear-release-aab
          path: dist/wear-aab

      - name: Download phone mapping artifact
        uses: actions/download-artifact@v4
        with:
          name: dunio-release-mapping
          path: dist/mapping

      - name: Download wear mapping artifact
        uses: actions/download-artifact@v4
        with:
          name: dunio-wear-release-mapping
          path: dist/wear-mapping

      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Dunio ${{ github.ref_name }}
          body: |
            ## Build versions
            - Phone: ${{ steps.versions.outputs.app_version }}
            - Wear: ${{ steps.versions.outputs.wear_version }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/apk/*.apk
            dist/aab/*.aab
            dist/wear-apk/*.apk
            dist/wear-aab/*.aab
            dist/mapping/*.txt
            dist/wear-mapping/*.txt
