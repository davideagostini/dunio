name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create placeholder google-services.json
        run: |
          mkdir -p app
          cat <<'EOF' > app/google-services.json
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:placeholder",
                  "android_client_info": {
                    "package_name": "com.davideagostini.summ"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin

  build-release-artifacts:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create placeholder google-services.json
        run: |
          mkdir -p app
          cat <<'EOF' > app/google-services.json
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:placeholder",
                  "android_client_info": {
                    "package_name": "com.davideagostini.summ"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Build signed release AAB
        run: ./gradlew bundleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: summ-release-apk
          path: app/build/outputs/apk/release/summ-*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: summ-release-aab
          path: app/build/outputs/bundle/release/summ-*.aab
          if-no-files-found: error

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: summ-release-mapping
          path: app/build/outputs/mapping/release/summ-*-mapping.txt
          if-no-files-found: error

      - name: Upload native debug metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: summ-release-native-debug-metadata
          path: app/build/intermediates/native_debug_metadata/release/*
          if-no-files-found: error

      - name: Upload native symbol tables artifact
        uses: actions/upload-artifact@v4
        with:
          name: summ-release-native-symbol-tables
          path: app/build/intermediates/native_symbol_tables/release/*
          if-no-files-found: error

  publish-tagged-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-release-artifacts

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: summ-release-apk
          path: dist/apk

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: summ-release-aab
          path: dist/aab

      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Summ ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/apk/*.apk
            dist/aab/*.aab
