name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Create placeholder google-services.json
        # CI only verifies compilation. A minimal placeholder keeps the Google Services plugin happy
        # without requiring private Firebase config in the public repository.
        run: |
          mkdir -p app
          cat <<'EOF' > app/google-services.json
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:placeholder",
                  "android_client_info": {
                    "package_name": "com.davideagostini.summ"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Assemble debug
        run: ./gradlew assembleDebug
